<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./Principal.css">

    <title>Netflix</title>
</head>

<body>
    <aside>
        <a><img class="lateral" src="../img/lupa.png"></a>
        <a><img class="lateral" src="../img/casa.png"></a>
        <a><img class="lateral" src="../img/tv.png"></a>
        <a><img class="lateral" src="../img/filme.png"></a>
        <a><img class="lateral" src="../img/mais.png"></a>
    </aside>

    <main>
        <section class="principal">
            <img class="destaque" src="../img/principa.webp">
            <div class="text">
                <p class="text-cima">
                    ORIGINAL <b>NETFLIX</b>
                </p>
                <p class="titulo"><b>STRANGER THINGS</b></p>
                <p class="relacao">
                    <b class="porcentagem">97% relevante</b> 2017 5 temporadas
                </p>
                <p class="descricao">
                    Quando um rapaz desaparece, uma pequena vila<br>
                    descobreum mistério relacionado com experiências<br>
                    secretas, assustadoras forças sobrenaturais e uma <br>
                    estranha menina.
                </p>
            </div>

            <div>
                <h3>Populares na Netflix</h3>
                <a><img class="filmes" src="../img/Filme1.png" alt="Lucifer"></a>
                <a><img class="filmes" src="../img/filme2.png" alt="Ragnarok"></a>
                <a><img class="filmes" src="../img/filme3.png" alt="The100"></a>
                <a><img class="filmes" src="../img/filme4.png" alt="IronFist"></a>
                <a><img class="filmes" src="../img/filme5.png" alt="Wandinha"></a>
            </div>

            <div>
                <h3>Vistos recentemente</h3>
                <a><img class="filmes" src="../img/filme6.jpg" alt="Lucifer"></a>
                <a><img class="filmes" src="../img/filme7.webp" alt="Ragnarok"></a>
                <a><img class="filmes" src="../img/filme8.jpg" alt="The100"></a>
                <a><img class="filmes" src="../img/filme9.jpg" alt="IronFist"></a>
                <a><img class="filmes" src="../img/filme10.png" alt="Wandinha"></a>
            </div>
        </section>
    </main>
</body>

</html>
